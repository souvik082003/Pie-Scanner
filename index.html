          <span class="lang-label">বাং</span>

        <button id="theme-toggle" class="header-icon-btn" aria-label="Toggle theme">

            stroke-width="2">

          </svg>

      </div>

      <div id="page-content" class="page-content">
        <!-- Dynamic content loaded here -->
